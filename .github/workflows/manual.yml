name: Run RPA Task

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  rpa-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Newman and Dependencies
        run: |
          npm install -g newman
          npm install

      - name: Run RPA Script
        run: node run_HA_2025_9.js 1 10000

      - name: Upload CSV Result
        uses: actions/upload-artifact@v4
        with:
          name: report_csv           # ชื่อโฟลเดอร์ที่จะแสดงบน GitHub
          path: "*.csv"                   # ระบุชื่อไฟล์ หรือใช้ *.csv เพื่อเก็บทุกไฟล์ที่เป็น csv
          retention-days: 5               # ตั้งเวลาให้เก็บไฟล์ไว้กี่วัน (ปกติสูงสุด 90 วัน)
